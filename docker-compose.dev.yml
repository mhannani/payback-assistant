services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: payback
      POSTGRES_USER: payback
      POSTGRES_PASSWORD: payback
    ports:
      - "5433:5432"           # host 5433 to avoid clashing with a local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payback -d payback"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: runtime
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # live reload during development
    environment:
      APP_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: payback
      POSTGRES_USER: payback
      POSTGRES_PASSWORD: payback
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
