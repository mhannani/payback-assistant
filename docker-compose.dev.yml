services:
  db:
    image: pgvector/pgvector:pg16
    container_name: payback_db
    env_file: .env.dev    # POSTGRES_* live in one place (see .env.example)
    ports:
      - "5433:5432"           # host 5433 to avoid clashing with a local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Schema is applied by `data.init_db` (make seed runs it first), the same path dev and cloud
      # use — not the DB image's init hook, so there's one schema mechanism everywhere.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payback -d payback"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    image: payback-api:dev
    container_name: payback_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend/app:/app/app   # live reload during development
      - ./demo:/demo                  # demo client (make demo), run from inside the container
      - ./perf:/perf                  # load-test client (make perf), reuses /demo/queries.json
    env_file: .env.dev    # all app config in one place (see .env.example for the options)
    environment:
      POSTGRES_HOST: db   # in-network DB host; overrides the .env.dev value for compose
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
