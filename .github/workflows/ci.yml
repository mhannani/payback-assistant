name: CI

# Pre-merge gate for PULL REQUESTS: build both Docker images (api + web) so a build break is caught
# in review, before merge. This is what would have caught the `npm ci` ERESOLVE that only surfaces in
# the Docker build (not in a plain `npm run build`). Build-only, no push, no secrets.
#
# NOTE: this is PR-only on purpose. On a direct push to the showcase branch the DEPLOY workflow runs,
# and its own `build` job is the gate there (`deploy` needs `build.result == 'success'`) — so a build
# break already blocks that deploy. Running CI on push too would just double-build in parallel.

on:
  pull_request:
    branches: [feat/showcase-widget, main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    name: Build images (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build the API image — exactly what the deploy/build job does, but without pushing.
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # Build the web image — catches frontend Dockerfile / npm-install / next-build breaks.
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          push: false
          build-args: |
            NEXT_PUBLIC_API_BASE=https://api.payback.mhannani.me
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
